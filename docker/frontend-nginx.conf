server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — Ketcher needs 'unsafe-inline' for runtime styles
    # and 'unsafe-eval' for some of its dynamic chemistry rendering.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self' data:;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend health
    location /health {
        proxy_pass http://backend:8123;
        proxy_set_header Host $host;
    }

    # Synchronous endpoints — JSON in, JSON out, can be slow (10-30s for /plan
    # while AiZynthFinder runs the search; 5-15s for /expand_step).
    location ~ ^/(plan|expand_step)$ {
        proxy_pass http://backend:8123;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Streaming endpoint — must NOT buffer (NDJSON token-by-token).
    location /chat {
        proxy_pass http://backend:8123;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }
}
