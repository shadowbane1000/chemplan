name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: small
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Build frontend
        run: cd frontend && npm run build

  deploy-app:
    runs-on: small
    needs: lint-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H tyler.colberts.us >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship source to server
        run: |
          # Pack just the build inputs — no node_modules, no .git, no dist.
          tar --exclude='./.git' \
              --exclude='./frontend/node_modules' \
              --exclude='./frontend/dist' \
              --exclude='./backend/data' \
              --exclude='./backend/__pycache__' \
              --exclude='./backend/*.egg-info' \
              -czf /tmp/chemplan-src.tar.gz .
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us 'mkdir -p ~/chemplan/src'
          scp -i ~/.ssh/deploy_key /tmp/chemplan-src.tar.gz ec2-user@tyler.colberts.us:/tmp/chemplan-src.tar.gz

      - name: Build and deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us << 'DEPLOY'
            set -e
            cd ~/chemplan

            # Refresh source tree from the runner-uploaded tarball.
            rm -rf src
            mkdir src
            tar -xzf /tmp/chemplan-src.tar.gz -C src
            rm /tmp/chemplan-src.tar.gz

            # Compose file lives outside src/ so it's stable across rebuilds.
            cp src/docker-compose.yml ./docker-compose.yml

            # Build images on the host (avoids runner-docker dependency).
            cd src
            docker build -t chemplan-frontend:latest -f frontend/Dockerfile .
            docker build -t chemplan-backend:latest -f backend/Dockerfile .
            cd ..

            # Bring up the stack (backend will auto-download AiZynthFinder
            # data on first run if /opt/chemplan/data is empty).
            docker compose up -d --force-recreate

            echo "Waiting for health check..."
            for i in $(seq 1 150); do
              if curl -sf http://localhost:8084/health > /dev/null 2>&1; then
                echo "Deploy successful — health check passed"
                exit 0
              fi
              sleep 2
            done
            echo "WARNING: Health check did not pass within 5 minutes"
            docker compose logs --tail 40
            exit 1
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
